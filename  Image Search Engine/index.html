<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Image Search Engine</title>
    <link rel="stylesheet" href="../output.css">
</head>
<body class="bg-[#39297b] text-white">
    <h1 class="text-center mt-25 mx-auto mb-12.5 font-bold text-3xl">image search engine</h1>
    <form id="searchForm" class="w-9/10 m-auto h-20 bg-[#434989] flex items-center rounded-lg">
        <input type="text" id="searchBox" placeholder="Search anthing here..." class="flex-1 h-full border-0 outline-0 bg-transparent text-white text-lg px-7.5 placeholder:text-white placeholder:text-[18px]">
        <button class="px-10 h-full bg-[#ff3929] text-white text-xl border-0 outline-0 rounded-tr-lg rounded-br-lg cursor-pointer">Search</button>
    </form>
    <div id="searchResult" class="w-8/10 mt-25 mx-auto mb-12.5 grid grid-cols-3 gap-10">

    </div>
    <button id="showMoreBtn" class="bg-[#ff3929] text-white border-0 outline-0 py-2.5 px-5 rounded-sm mt-2.5 mx-auto mb-25 cursor-pointer hidden">Show More</button>


    <script src="script.js"></script>
</body>
</html>
