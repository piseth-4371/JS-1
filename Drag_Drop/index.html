<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag & Drop</title>
    <link rel="stylesheet" href="../output.css">
</head>
<body>
    <div class="w-full min-h-screen bg-[#0b0423] flex items-center justify-center">
        <div id="left" class="w-75 min-h-100 m-5 border-dashed border-2 border-white">
            <div class="list bg-[#e91e63] h-15 m-7.5 flex items-center cursor-grab text-white" draggable="true">
                <img src="images/drag_drop_icon.png" class="w-2.5 mr-3.75 ml-5">List Item 1
            </div>
            <div class="list bg-[#e91e63] h-15 m-7.5 flex items-center cursor-grab text-white" draggable="true">
                <img src="images/drag_drop_icon.png" class="w-2.5 mr-3.75 ml-5">List Item 2
            </div>
            <div class="list bg-[#e91e63] h-15 m-7.5 flex items-center cursor-grab text-white" draggable="true">
                <img src="images/drag_drop_icon.png" class="w-2.5 mr-3.75 ml-5">List Item 3
            </div>
            <div class="list bg-[#e91e63] h-15 m-7.5 flex items-center cursor-grab text-white" draggable="true">
                <img src="images/drag_drop_icon.png" class="w-2.5 mr-3.75 ml-5">List Item 4
            </div>
        </div>
        <div id="right" class="w-75 min-h-100 m-5 border-dashed border-2 border-white">

        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
